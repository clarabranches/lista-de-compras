<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<!-- VIEWPORT CORRIGIDO -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Lista de Compras</title>

<style>
:root {
    --green-main: #9CAF3C;
    --green-light: #C8D48A;
    --blue: #4FA8F7;
    --red: #E05A5A;
}

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #eee;
}

/* HEADER */
header {
    background: var(--green-main);
    color: white;
    padding: 40px 20px 60px;
    border-bottom-left-radius: 60px;
    border-bottom-right-radius: 60px;
}

.header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header-text h1 {
    font-size: 2rem;
}

.header-text span {
    font-size: 1.5rem;
    font-weight: bold;
}

.profile {
    width: 60px;
    height: 60px;
    background: #dce7a3;
    border-radius: 15px;
}

/* MAIN */
main {
    margin-top: 20px;
    padding: 20px;
}

/* GRID */
.lista {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: var(--green-light);
    border-radius: 15px;
    padding: 15px;
    padding-bottom: 45px;
    position: relative;
}

/* BOTÃO REMOVER */
.remove-btn {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: var(--red);
    border: none;
    color: white;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    cursor: pointer;
}

/* CONTEÚDO */
.card-content {
    display: flex;
    gap: 10px;
    align-items: flex-start;
}

.icon {
    font-size: 30px;
}

/* INPUTS */
.card input {
    border: none;
    border-radius: 8px;
    padding: 6px;
    text-align: center;
    font-size: 16px; /* 🔥 evita zoom */
}

/* ORGANIZAÇÃO */
.card-content > div:last-child {
    width: 100%;
}

.item-name {
    width: 100%;
    margin-bottom: 5px;
}

.controls {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-bottom: 5px;
}

.controls button {
    border: none;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    flex: 1;
}

.controls input {
    flex: 2;
    width: 60px;
}

.valor input {
    width: 100%;
    margin-bottom: 5px;
}

.valor-total {
    font-weight: bold;
}

/* BOTÃO ADD */
.add-btn {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    width: 65px;
    height: 65px;
    border-radius: 50%;
    border: none;
    background: var(--blue);
    color: white;
    font-size: 2.2rem;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* MOBILE */
@media (max-width: 600px) {

    header {
        padding: 30px 15px 50px;
    }

    .header-text h1 {
        font-size: 1.5rem;
    }

    .header-text span {
        font-size: 1.2rem;
    }

    .lista {
        grid-template-columns: 1fr;
    }

    .icon {
        font-size: 25px;
    }

    .add-btn {
        width: 60px;
        height: 60px;
        font-size: 2rem;
    }
}
</style>
</head>

<body>

<header>
    <div class="header-top">
        <div class="header-text">
            <h1>Lista de Compras</h1>
            <span>R$ <span id="soma-total">0,00</span></span>
        </div>
        <div class="profile"></div>
    </div>
</header>

<main>
    <div class="lista" id="lista-container"></div>
</main>

<button class="add-btn" onclick="adicionarLinha()">+</button>

<script>
const container = document.getElementById('lista-container');
const totalDisplay = document.getElementById('soma-total');

/* SALVAR */
function salvarLista() {
    const cards = document.querySelectorAll('.card');
    const lista = [];

    cards.forEach(card => {
        lista.push({
            nome: card.querySelector('.item-name').value,
            qtd: card.querySelector('.item-qtd').value,
            preco: card.querySelector('.item-price').value,
            checked: card.querySelector('.item-check').checked
        });
    });

    localStorage.setItem('listaCompras', JSON.stringify(lista));
}

/* CARREGAR */
function carregarLista() {
    const listaSalva = localStorage.getItem('listaCompras');

    if (!listaSalva) {
        adicionarLinha();
        return;
    }

    const lista = JSON.parse(listaSalva);

    lista.forEach(item => criarCard(item));

    atualizarContas();
}

/* CRIAR CARD */
function criarCard(item = {}) {
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
        <div class="card-content">
            <div class="icon">🛒</div>

            <div>
                <input type="text" class="item-name" placeholder="Item" value="${item.nome || ''}">

                <div class="controls">
                    <button onclick="alterarQtd(this, -1)">-</button>
                    <input type="number" class="item-qtd" value="${item.qtd || 1}" min="1" oninput="atualizarContas()">
                    <button onclick="alterarQtd(this, 1)">+</button>
                </div>

                <div class="valor">
                    <input type="number" class="item-price" placeholder="Valor" value="${item.preco || ''}" step="0.01" oninput="atualizarContas()">
                </div>

                <div>
                    <input type="checkbox" class="item-check" ${item.checked ? 'checked' : ''} onchange="atualizarContas()">
                    <span class="valor-total">0,00</span>
                </div>
            </div>
        </div>

        <button class="remove-btn" onclick="removerLinha(this)">×</button>
    `;

    container.appendChild(div);
}

/* ADICIONAR */
function adicionarLinha() {
    criarCard();
    salvarLista();
}

/* REMOVER */
function removerLinha(btn) {
    btn.parentElement.remove();
    atualizarContas();
}

/* ALTERAR QTD */
function alterarQtd(btn, valor) {
    const input = btn.parentElement.querySelector('.item-qtd');
    let qtd = parseInt(input.value) || 1;
    qtd += valor;
    if (qtd < 1) qtd = 1;
    input.value = qtd;
    atualizarContas();
}

/* CALCULAR */
function atualizarContas() {
    let total = 0;

    document.querySelectorAll('.card').forEach(card => {
        const qtd = parseFloat(card.querySelector('.item-qtd').value) || 0;
        const preco = parseFloat(card.querySelector('.item-price').value) || 0;
        const check = card.querySelector('.item-check').checked;

        const totalItem = qtd * preco;

        card.querySelector('.valor-total').innerText =
            totalItem.toLocaleString('pt-BR', { minimumFractionDigits: 2 });

        if (check) total += totalItem;
    });

    totalDisplay.innerText =
        total.toLocaleString('pt-BR', { minimumFractionDigits: 2 });

    salvarLista();
}

/* INICIAR */
window.onload = carregarLista;

</script>

</body>
</html>
