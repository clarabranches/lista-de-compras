<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Mercado</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        background-color: #9CAF3C;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .container {
        width: 90%;
        max-width: 1200px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 40px;
    }

    /* Espaço da imagem */
    .image-area {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .image-placeholder {
        width: 100%;
        max-width: 400px;
        height: 400px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        text-align: center;
        padding: 20px;
    }

    /* Área de texto */
    .content {
        flex: 1;
        color: white;
    }

    .content h1 {
        font-size: 3rem;
        margin-bottom: 20px;
        font-weight: 600;
    }

    .content p {
        font-size: 1.5rem;
        line-height: 1.6;
        margin-bottom: 30px;
        max-width: 500px;
    }

    .btn {
        background-color: #42A5F5;
        color: white;
        border: none;
        padding: 15px 40px;
        font-size: 1.2rem;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .btn:hover {
        background-color: #1E88E5;
        transform: translateY(-2px);
    }

    .btn:active {
        transform: scale(0.95);
    }

    /* Responsivo */
    @media (max-width: 768px) {
        .container {
            flex-direction: column;
            text-align: center;
        }

        .content h1 {
            font-size: 2.2rem;
        }

        .content p {
            font-size: 1.2rem;
        }
    }
</style>
</head>

<body>

<div class="container">

    <!-- Área da imagem -->
    <div class="image-area">
        <div class="image-placeholder">
            <img src="img/mulher-mercado.png" style="max-width: 100%;">
        </div>
    </div>

    <!-- Texto -->
    <div class="content">
        <h1>Meu Mercado</h1>
        <p>
            Organize suas compras de forma rápida.<br>
            Controle os gastos em tempo real.<br>
            Evite surpresas no caixa.
        </p>

        <button class="btn">COMEÇAR AGORA</button>
    </div>

</div>

</body>
</html>
